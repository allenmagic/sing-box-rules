name: Sync SRS Rule Files to Gitea

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  sync-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download SRS files
        run: |
          mkdir -p rules

          wget -O rules/adblock_reject.srs \
            "https://raw.githubusercontent.com/REIJI007/AdBlock_Rule_For_Sing-box/main/adblock_reject.srs"

          wget -O rules/geosite-category-ads-all.srs \
            "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-category-ads-all.srs"

          wget -O rules/adblocksingbox.srs \
            "https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblocksingbox.srs"

          wget -O rules/geosite-google.srs \
            "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-google.srs"

          wget -O rules/geosite-github.srs \
            "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-github.srs"

          ls -lh rules/

      - name: Install sing-box
        env:
          SING_BOX_VERSION: 1.12.20
        run: |
          mkdir -p "${HOME}/.local/bin" /tmp/sing-box
          curl -fsSL -o /tmp/sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/sing-box.tar.gz -C /tmp/sing-box --strip-components=1
          install /tmp/sing-box/sing-box "${HOME}/.local/bin/sing-box"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/sing-box" version

      - name: Compile local JSON rule sets
        shell: bash
        run: |
          if [ ! -d config ]; then
            echo "No config directory found, skip local JSON compilation."
            exit 0
          fi

          shopt -s nullglob
          json_files=(config/*.json)
          if [ "${#json_files[@]}" -eq 0 ]; then
            echo "No local JSON rule sets found, skip local compilation."
            exit 0
          fi

          failed_files=()
          mkdir -p /tmp/sing-box-compile-logs

          for json_file in "${json_files[@]}"; do
            output_file="rules/$(basename "${json_file}" .json).srs"
            error_log="/tmp/sing-box-compile-logs/$(basename "${json_file}" .json).log"

            echo "Compiling ${json_file} -> ${output_file}"
            if sing-box rule-set compile --output "${output_file}" "${json_file}" >"${error_log}" 2>&1; then
              echo "Compiled ${json_file} successfully."
            else
              failed_files+=("${json_file}")
              echo "::warning file=${json_file}::Failed to compile ${json_file}; skipped this file."
              echo "Compile error for ${json_file}:"
              cat "${error_log}"
              rm -f "${output_file}"
            fi
          done

          if [ "${#failed_files[@]}" -gt 0 ]; then
            echo "::warning::Local JSON compilation completed with failures: ${failed_files[*]}"
          fi

          ls -lh rules/

      - name: Push to Gitea
        env:
          GITEA_URL: ${{ secrets.GITEA_URL }}
          GITEA_REPO: ${{ secrets.GITEA_REPO }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_BRANCH: ${{ secrets.GITEA_BRANCH || 'main' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch "${GITEA_BRANCH}"

          # 解析用户名和仓库名
          GITEA_USER=$(echo "${GITEA_REPO}" | cut -d'/' -f1)
          REPO_NAME=$(echo "${GITEA_REPO}" | cut -d'/' -f2)

          REMOTE_URL="${GITEA_URL}/${GITEA_REPO}.git"
          REMOTE_AUTH=$(echo "${REMOTE_URL}" | sed "s|://|://${GITEA_TOKEN}@|")

          # 尝试克隆，如果仓库不存在则通过 API 创建
          if ! git clone --depth 1 --branch "${GITEA_BRANCH}" "${REMOTE_AUTH}" gitea-repo 2>/dev/null; then
            echo "Repository not found, creating via Gitea API..."

            HTTP_CODE=$(curl -s -o /tmp/api_resp.json -w "%{http_code}" \
              -X POST "${GITEA_URL}/api/v1/user/repos" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"${REPO_NAME}\",
                \"private\": false,
                \"default_branch\": \"${GITEA_BRANCH}\",
                \"auto_init\": false
              }")

            if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "409" ]; then
              echo "Repository ready (HTTP ${HTTP_CODE})"
            else
              echo "Failed to create repository (HTTP ${HTTP_CODE}):"
              cat /tmp/api_resp.json
              exit 1
            fi

            # 初始化本地仓库
            mkdir gitea-repo && cd gitea-repo
            git init
            git checkout -b "${GITEA_BRANCH}"
            git remote add origin "${REMOTE_AUTH}"
            cd ..
          fi

          # 同步文件
          mkdir -p gitea-repo/rules
          cp rules/*.srs gitea-repo/rules/

          cd gitea-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected, skip push."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            git commit -m "chore: update srs rule files [${TIMESTAMP}]"
            git push -u origin "${GITEA_BRANCH}"
            echo "Push completed."
          fi
